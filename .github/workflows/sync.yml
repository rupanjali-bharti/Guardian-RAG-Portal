name: Sync to Hugging Face hub
on:
  push:
    branches: [main] # Runs every time you push to the main branch
jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Fetches full history so the push works
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }} # Uses the secret you just saved
        run: git push --force https://rupanjali-bharti:$HF_TOKEN@huggingface.co/spaces/rupanjali-bharti/Guardian-RAG-Portal main